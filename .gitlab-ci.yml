variables:
  BASE_IMAGE: python
  FF_NETWORK_PER_BUILD: "true"

.versions:
  py313: &py313
    PYTHON_VERSION: "3.13@sha256:2427cb1a721e022e604aeafb0fdac48af5b11b880ba1ce6f317116ba5ed21be4"
  py314: &py314
    PYTHON_VERSION: "3.14@sha256:3c737d592b9e137029b9f3fd3bfc50d0de7f41c3334f4212db563ff9eaa1f856"

stages:
  - build
  - manifest

.base_job: &base_job
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      variables:
        TAG_SUFFIX: "-mr${CI_MERGE_REQUEST_IID}"
    # No suffix for default branch
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_REF_PROTECTED == "true"
      variables:
        TAG_SUFFIX: ""

build_docker_image:
  <<: *base_job
  stage: build
  image: docker:latest@sha256:eed377f3ce14afda560e742c5b3ae446df1ce00a16e1beab2ac6c78c1477fe85
  tags:
    - $RUNNER_TAG
  script:
    - apk add bash
    - if [ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]; then
      docker login -u "${CI_REGISTRY_USER}" -p "${CI_JOB_TOKEN}" "${CI_REGISTRY}";
      fi
    - ./bin/build.sh
  parallel:
    matrix:
      # Python 3.13
      - <<: *py313
        TARGET_STAGE: python
        MUTABLE_TAG_NAME: "3.13"
        IMMUTABLE_TAG_NAME: "3.13.${CI_PIPELINE_IID}"
        ARCH: amd64
        RUNNER_TAG: thelab-amd64
      - <<: *py313
        TARGET_STAGE: python
        MUTABLE_TAG_NAME: "3.13"
        IMMUTABLE_TAG_NAME: "3.13.${CI_PIPELINE_IID}"
        ARCH: arm64
        RUNNER_TAG: thelab-arm64

      # Python 3.14
      - <<: *py314
        TARGET_STAGE: python
        MUTABLE_TAG_NAME: "3.14"
        IMMUTABLE_TAG_NAME: "3.14.${CI_PIPELINE_IID}"
        ARCH: amd64
        RUNNER_TAG: thelab-amd64
      - <<: *py314
        TARGET_STAGE: python
        MUTABLE_TAG_NAME: "3.14"
        IMMUTABLE_TAG_NAME: "3.14.${CI_PIPELINE_IID}"
        ARCH: arm64
        RUNNER_TAG: thelab-arm64

      # Python 3.13 + Node 22
      - <<: *py313
        TARGET_STAGE: python-node
        NODE_VERSION: "22"
        MUTABLE_TAG_NAME: "3.13-node22"
        IMMUTABLE_TAG_NAME: "3.13.${CI_PIPELINE_IID}-node22"
        ARCH: amd64
        RUNNER_TAG: thelab-amd64
      - <<: *py313
        TARGET_STAGE: python-node
        NODE_VERSION: "22"
        MUTABLE_TAG_NAME: "3.13-node22"
        IMMUTABLE_TAG_NAME: "3.13.${CI_PIPELINE_IID}-node22"
        ARCH: arm64
        RUNNER_TAG: thelab-arm64

      # Python 3.13 + Node 24
      - <<: *py313
        TARGET_STAGE: python-node
        NODE_VERSION: "24"
        MUTABLE_TAG_NAME: "3.13-node24"
        IMMUTABLE_TAG_NAME: "3.13.${CI_PIPELINE_IID}-node24"
        ARCH: amd64
        RUNNER_TAG: thelab-amd64
      - <<: *py313
        TARGET_STAGE: python-node
        NODE_VERSION: "24"
        MUTABLE_TAG_NAME: "3.13-node24"
        IMMUTABLE_TAG_NAME: "3.13.${CI_PIPELINE_IID}-node24"
        ARCH: arm64
        RUNNER_TAG: thelab-arm64

      # Python 3.14 + Node 24
      - <<: *py314
        TARGET_STAGE: python-node
        NODE_VERSION: "24"
        MUTABLE_TAG_NAME: "3.14-node24"
        IMMUTABLE_TAG_NAME: "3.14.${CI_PIPELINE_IID}-node24"
        ARCH: amd64
        RUNNER_TAG: thelab-amd64
      - <<: *py314
        TARGET_STAGE: python-node
        NODE_VERSION: "24"
        MUTABLE_TAG_NAME: "3.14-node24"
        IMMUTABLE_TAG_NAME: "3.14.${CI_PIPELINE_IID}-node24"
        ARCH: arm64
        RUNNER_TAG: thelab-arm64

manifest:
  stage: manifest
  needs: [build_docker_image]
  tags:
    - thelab-arm64
  image: docker:latest@sha256:eed377f3ce14afda560e742c5b3ae446df1ce00a16e1beab2ac6c78c1477fe85
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_REF_PROTECTED == "true"
  script:
    - apk add bash
    - docker login -u "${CI_REGISTRY_USER}" -p "${CI_JOB_TOKEN}" "${CI_REGISTRY}"
    - ./bin/push-manifest.sh
  parallel:
    matrix:
      - MUTABLE_TAG_NAME: "3.13"
        IMMUTABLE_TAG_NAME: "3.13.${CI_PIPELINE_IID}"
      - MUTABLE_TAG_NAME: "3.14"
        IMMUTABLE_TAG_NAME: "3.14.${CI_PIPELINE_IID}"
      - MUTABLE_TAG_NAME: "3.13-node22"
        IMMUTABLE_TAG_NAME: "3.13.${CI_PIPELINE_IID}-node22"
      - MUTABLE_TAG_NAME: "3.13-node24"
        IMMUTABLE_TAG_NAME: "3.13.${CI_PIPELINE_IID}-node24"
      - MUTABLE_TAG_NAME: "3.14-node24"
        IMMUTABLE_TAG_NAME: "3.14.${CI_PIPELINE_IID}-node24"
